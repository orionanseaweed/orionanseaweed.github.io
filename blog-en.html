<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog — Xuan Tung Hoang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="figures/logo-and-ref-img/Stone-MinecraftWiki.png">
    <link rel="stylesheet" href="style-index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .container {
            width: 90%;
        }
        h1 {
            margin-top: 5px; /* Giảm khoảng cách trên của tiêu đề */
            font-size: 2em;
            margin-bottom: 5px;
        }
        h2 {
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 1.5em;
        }
        h3 {
            margin-top: 12px;
            font-size: 1.25em;
        }
        p {
            margin-top: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            line-height: 1.6;
        }
        .post {
            margin-bottom: 20px;
        }
        .tags, .date {
            font-size: 0.85em;
            color: #555;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let postsContainer = document.getElementById("posts-container");
            let posts = Array.from(document.querySelectorAll(".post"));
            
            posts.sort((a, b) => {
                let dateA = new Date(a.dataset.date);
                let dateB = new Date(b.dataset.date);
                return dateB - dateA;
            });
            
            posts.forEach(post => postsContainer.appendChild(post));
        });

        function filterByTag(tag) {
            let posts = document.querySelectorAll('.post');
            posts.forEach(post => {
                if (tag === 'all' || post.dataset.tags.includes(tag)) {
                    post.style.display = 'block';
                } else {
                    post.style.display = 'none';
                }
            });
        }
    </script>

    <script>
        function toggleMenu() {
            var menu = document.querySelector(".nav-links");
            if (menu.style.display === "flex") {
                menu.style.display = "none";
            } else {
                menu.style.display = "flex";
            }
        }
    </script>
</head>

<body>

<nav class="navbar">

    </div>
    
    <div class="nav-links">
        <a href="index.html">About</a>

</nav>

<script>
    // Improved menu toggle function
    function toggleMenu() {
        var menu = document.querySelector(".nav-links");
        if (menu.style.display === "flex") {
            menu.style.display = "none";
        } else {
            menu.style.display = "flex";
        }
    }
    
    // Add active class to current page
    document.addEventListener("DOMContentLoaded", function() {
        const currentPage = window.location.pathname.split("/").pop() || "index.html";
        const navLinks = document.querySelectorAll(".nav-links a");
        
        navLinks.forEach(link => {
            if (link.getAttribute("href") === currentPage) {
                link.classList.add("active");
            }
        });
    });
</script>

<!-- Main Content -->
