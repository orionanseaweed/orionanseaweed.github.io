<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Xuan Tung Hoang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="png" href="figures/logo-and-ref-img/Stone-MinecraftWiki.png">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0px auto;
            padding: 10px;
            max-width: 1350px;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
        }
        h1 {
            margin-top: 5px; /* Giảm khoảng cách trên của tiêu đề */
            font-size: 2em;
            margin-bottom: 5px;
        }
        h2 {
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 1.5em;
        }
        h3 {
            font-size: 1.25em;
        }
        p {
            font-size: 0.9em;
            line-height: 1.4;
        }
        a {
            text-decoration: none;
            color: #000;
        }
        a:hover {
            text-decoration: underline;
        }
        a:visited {
            color: blue;
        }
        .post {
            margin-bottom: 20px;
        }
        .tags, .date {
            font-size: 0.85em;
            color: #555;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let postsContainer = document.getElementById("posts-container");
            let posts = Array.from(document.querySelectorAll(".post"));
            
            posts.sort((a, b) => {
                let dateA = new Date(a.dataset.date);
                let dateB = new Date(b.dataset.date);
                return dateB - dateA;
            });
            
            posts.forEach(post => postsContainer.appendChild(post));
        });

        function filterByTag(tag) {
            let posts = document.querySelectorAll('.post');
            posts.forEach(post => {
                if (tag === 'all' || post.dataset.tags.includes(tag)) {
                    post.style.display = 'block';
                } else {
                    post.style.display = 'none';
                }
            });
        }
    </script>
</head>

<body>
    <h1>Blog</h1>

    <hr>
    
    <p>Filter by tag: 
        <a href="#" onclick="filterByTag('all')">All</a> | 
        <a href="#" onclick="filterByTag('science')">Science</a> | 
        <a href="#" onclick="filterByTag('astrobiology')">Astrobiology</a> | 
        <a href="#" onclick="filterByTag('biology')">Biology</a> |
        <a href="#" onclick="filterByTag('geology')">Geology</a>
    </p>

    <hr>
    
    <div id="posts-container">
        
        <div class="post" data-tags="science" data-date="2024-08-19">
            <h3><a href="blog/p2-s1-dyson-sphere.html">S1. Dyson Sphere</a></h3>
            <p class="date">Published on: Aug 18, 2024</p>
            <p>Short introduction to Dyson Sphere.</p>
            <p class="tags">Tags: Science</p>
        </div>
        
        <div class="post" data-tags="astrobiology biology" data-date="2024-08-18">
            <h3><a href="blog/p1-a1-astrobiology.html">A1. Astrobiology</a></h3>
            <p class="date">Published on: Aug 18, 2024</p>
            <p>Short introduction to Astrobiology.</p>
            <p class="tags">Tags: Astrobiology</p>
        </div>
    </div>


    <hr>

    <small><i> (Last updated 2025 Mar 20) </i></small>

</body>
</html>
