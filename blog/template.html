<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 25px auto; padding: 15px; max-width: 800px; }
        h1 { font-size: 2em; }
        .date { font-size: 0.85em; color: #555; }
        blockquote { border-left: 4px solid #ccc; padding-left: 10px; color: #555; font-style: italic; }
    </style>
</head>
<body>

    <h1 id="post-title">Loading...</h1>
    <p class="date" id="post-date"></p>
    <div id="post-content"></div>

    <h3>Leave a Comment</h3>
    <p><a href="mailto:hxtunq@gmail.com?subject=Comment on Blog Post">Send your comment via email</a></p>

    <script>
        // Lấy tham số từ URL (ví dụ: ?post=post1)
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('post') || 'default';

        // Danh sách bài viết
        const posts = {
            "post1": {
                "title": "Exploring Microbial Life on Mars",
                "date": "March 19, 2025",
                "content": "<p>Microbial life on Mars is a fascinating topic...</p><blockquote>Life finds a way.</blockquote>"
            },
            "post2": {
                "title": "The Future of Biotech",
                "date": "March 20, 2025",
                "content": "<p>Biotechnology is advancing at a rapid pace...</p>"
            }
        };

        // Nạp nội dung bài viết
        if (posts[postId]) {
            document.getElementById("post-title").innerText = posts[postId].title;
            document.getElementById("post-date").innerText = "Published on: " + posts[postId].date;
            document.getElementById("post-content").innerHTML = posts[postId].content;
        } else {
            document.getElementById("post-title").innerText = "Post Not Found";
            document.getElementById("post-content").innerHTML = "<p>Sorry, the post you are looking for does not exist.</p>";
        }
    </script>

</body>
</html>
