<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title of Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="png" href="@-logo-blog.png">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0px auto;
            padding: 10px;
            max-width: 1350px;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
        }
        h1 {
            margin-top: 5px; /* Giảm khoảng cách trên của tiêu đề */
            font-size: 2em;
            margin-bottom: 5px;
        }
        h2 {
            margin-top: 5px;
            margin-bottom: 5px;
            font-size: 1.5em;
        }
        h3 {
            margin-top: 12px;
            margin-bottom: 15px;
            font-size: 1.25em;
        }
        p {
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 0.95em;
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: #000;
        }
        a:hover {
            text-decoration: underline;
        }
        .tags, .date {
            font-size: 0.85em;
            color: #555;
        }
        ol {
            font-size: 0.95em;
            margin: 0;
            padding-left: 30px;
        }
        ol li {
            font-size: 0.95em;
            margin-top: 10px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        ul {
            font-size: 0.95em;
            margin: 0;
            padding-left: 30px;
        }
        ul li {
            font-size: 0.95em;
            margin-top: 10px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
    </style>
</head>
