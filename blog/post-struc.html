<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title of Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 25px auto;
            padding: 15px;
            max-width: 800px;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
        }
        h1 {
            font-size: 2em;
        }
        h2 {
            font-size: 1.5em;
        }
        p {
            font-size: 0.95em;
        }
        a {
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .tags, .date {
            font-size: 0.85em;
            color: #555;
        }
        ol {
            font-size: 0.95em;
            margin: 0;
            padding-left: 30px;
        }
        ol li {
            font-size: 0.95em;
            margin-top: 10px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        ul {
            font-size: 0.95em;
            margin: 0;
            padding-left: 30px;
        }
        ul li {
            font-size: 0.95em;
            margin-top: 10px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        blockquote {
            border-left: 3px solid #FF0000	; /* Tạo gạch thẳng đứng */
            padding-left: 15px;
            margin: 20px 0;
            color: #333;
            font-style: italic;
        }
    </style>
</head>

<body>

    <h1>Title of Blog Post</h1>

    <hr>

    <p class="date">Published on: Aug 16, 2024</p>
    <p class="tags">Tags: Astrobiology, Biology</p>

    <hr>

    <div class="content">

        <p>
            This is where the full content of the blog post goes. You can add multiple paragraphs, images, or even links to other related posts.
        </p>

        <p>
            <span style="color: #FF0000">[1]</span>
        </p>
    
    </div>

    <hr>

    <small>
        If you have questions regarding content or copyright, please <a href="mailto:concealedcharacterx@gmail.com">email me</a>.
    </small>

</body>

</html>
